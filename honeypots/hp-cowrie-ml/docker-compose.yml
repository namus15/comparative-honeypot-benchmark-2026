# Placeholder docker-compose.yml for Cowrie + Isolation Forest (final version coming soon)
version: '3.8'
services:
  cowrie-ml:
    build: .
    ports:
      - "2222:2222/tcp"
    volumes:
      - cowrie-data:/cowrie/var/lib/cowrie/
      - cowrie-logs:/cowrie/var/log/cowrie/
    environment:
      - TZ=Europe/Berlin
volumes:
  cowrie-data:
  cowrie-logs:
